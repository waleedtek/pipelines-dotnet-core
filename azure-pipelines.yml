# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: windows-latest

jobs:
- job: DotNet_Matrix_Build
  displayName: 'Build & Test on multiple .NET versions'

  strategy:
    matrix:
      net6:
        dotnetVersion: '6.0.x'
      net8:
        dotnetVersion: '8.0.x'
    maxParallel: 2

  steps:
  - task: UseDotNet@2
    displayName: 'Install .NET SDK $(dotnetVersion)'
    inputs:
      packageType: 'sdk'
      version: '$(dotnetVersion)'

  - script: dotnet --version
    displayName: 'Verify SDK version'

  - task: DotNetCoreCLI@2
    displayName: 'Build'
    inputs:
      command: build
      projects: '**/*.csproj'

  - task: DotNetCoreCLI@2
    displayName: 'Test with Code Coverage'
    inputs:
      command: test
      projects: '**/*.csproj'
      arguments: '--collect:"XPlat Code Coverage"'


